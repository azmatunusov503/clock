<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
  <title>Document</title>
</head>
<body>
  <div class="tabPanel">
    <div class="tabPanel-links">
      <a href="#!" class="tabPanel-links_a active">Часы</a>
      <a href="#!" class="tabPanel-links_a">Секундомер<span class="indicator"></span></a>
    </div>
    <div class="tabPanel-content">
      <div class="tabPanel-content_item active">
        <div class="arrowClock">
          <div class="arrowClock-number">
            <div class="arrowClock-number_num num-3">3</div>
            <div class="arrowClock-number_num num-6">6</div>
            <div class="arrowClock-number_num num-9">9</div>
            <div class="arrowClock-number_num num-12">12</div>
            <div class="arrowClock-number_arr num-1-7"></div>
            <div class="arrowClock-number_arr num-2-8"></div>
            <div class="arrowClock-number_arr num-4-10"></div>
            <div class="arrowClock-number_arr num-5-11"></div>
          </div>
          
          <div class="arr-hours"></div>
          <div class="arr-minutes"></div>
          <div class="arr-seconds"></div>
        </div>
        
        <div class="numberClock">
          <div class="numberClock-num num-hours">00</div>
          <div class="numberClock-num num-minutes">00</div>
          <div class="numberClock-num num-seconds">00</div>
        </div>
      </div>
      <div class="tabPanel-content_item">
        <div class="stopWatch">
          <div class="stopWatch-number">
            <div class="stopWatch-number_num minutes"><span>00</span>мин.</div>
            <div class="stopWatch-number_num seconds"><span>00</span>сек.</div>
            <div class="stopWatch-number_num milliSeconds"> <span>00</span>мил.</div>
          </div>
          <div class="stopWatch-btn">
            <button class="start">start</button>
            <button class="result">result</button>
          </div>
          <div class="stopWatch-result">
            
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <p>Lorem, ipsum.</p>
